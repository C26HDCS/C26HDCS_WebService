<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원 가입 - HDCS Web Service</title>
    <link rel="stylesheet" th:href="@{/static/css/login.css}">
    <style>
        .reg-input-row {
            display: flex;
            gap: 8px;
            align-items: stretch;
        }
        .reg-input-row input { flex: 1; margin: 0; width: auto; min-width: 0; }
        .btn-check-dup {
            flex-shrink: 0;
            padding: 0 14px;
            background: transparent;
            border: 1px solid #3a7bd5;
            color: #3a7bd5;
            border-radius: 6px;
            font-size: 12.5px;
            cursor: pointer;
            white-space: nowrap;
            transition: background .15s, color .15s;
        }
        .btn-check-dup:hover  { background: #3a7bd5; color: #fff; }
        .btn-check-dup:disabled { opacity: .45; cursor: not-allowed; }
        .field-msg   { font-size: 11.5px; margin-top: 5px; min-height: 16px; }
        .field-error   { color: #e74c3c; }
        .field-success { color: #2ecc71; }
        .login-form input.input-error { border-color: #e74c3c !important; }
        .reg-success-box {
            background: rgba(46,204,113,.1);
            border: 1px solid rgba(46,204,113,.3);
            color: #2ecc71;
            border-radius: 8px;
            padding: 14px 18px;
            text-align: center;
            font-size: 14px;
            margin-bottom: 18px;
        }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="login-box" style="max-width: 1000px;">

        <!-- 왼쪽: 장식 패널 -->
        <div class="login-left">
            <div class="deco-ring deco-ring-1"></div>
            <div class="deco-ring deco-ring-2"></div>
            <div class="deco-ring deco-ring-3"></div>
            <div class="deco-dot deco-dot-1"></div>
            <div class="deco-dot deco-dot-2"></div>

            <div class="left-content">
                <img th:src="@{/static/images/logo.png}" alt="기후에너지환경부 한강홍수통제소" class="agency-logo">
                <div class="left-system-name">수자원통신위성<br>수문자료 수집 시스템</div>
                <p class="left-desc">기후에너지환경부 한강홍수통제소<br>HDCS Web Service 계정을 생성합니다</p>
            </div>

            <div class="left-badge">HDCS Web Service v1.0</div>
        </div>

        <!-- 오른쪽: 회원가입 폼 -->
        <div class="login-right">
            <div style="width: 100%; max-width: 440px;">

                <div class="right-title">회원 가입</div>
                <div class="right-subtitle">아래 정보를 입력하여 계정을 생성하세요</div>

                <!-- 성공 메시지 (가입 완료 후 표시) -->
                <div id="successBox" class="reg-success-box" style="display:none;"></div>

                <div id="registerForm" class="login-form">

                    <!-- 아이디 -->
                    <div class="form-group">
                        <label for="userId">아이디 *</label>
                        <div class="reg-input-row">
                            <input type="text" id="userId"
                                   placeholder="영문+숫자 조합 (예: user01)"
                                   autocomplete="off"
                                   oninput="onUserIdInput()">
                            <button type="button" id="btnCheckDup"
                                    class="btn-check-dup" disabled
                                    onclick="checkDuplicate()">중복확인</button>
                        </div>
                        <div id="userIdMsg" class="field-msg"></div>
                    </div>

                    <!-- 이름 -->
                    <div class="form-group">
                        <label for="name">이름 *</label>
                        <input type="text" id="name"
                               placeholder="실명 입력"
                               oninput="validateName()">
                        <div id="nameMsg" class="field-msg"></div>
                    </div>

                    <!-- 비밀번호 -->
                    <div class="form-group">
                        <label for="password">비밀번호 *</label>
                        <input type="password" id="password"
                               placeholder="영문+숫자+특수문자 8자 이상"
                               oninput="validatePassword()">
                        <div id="passwordMsg" class="field-msg"></div>
                    </div>

                    <!-- 비밀번호 확인 -->
                    <div class="form-group">
                        <label for="passwordConfirm">비밀번호 확인 *</label>
                        <input type="password" id="passwordConfirm"
                               placeholder="비밀번호 재입력"
                               oninput="validatePasswordConfirm()">
                        <div id="passwordConfirmMsg" class="field-msg"></div>
                    </div>

                    <!-- 이메일 -->
                    <div class="form-group">
                        <label for="email">이메일 *</label>
                        <input type="text" id="email"
                               placeholder="example@test.com"
                               oninput="validateEmail()">
                        <div id="emailMsg" class="field-msg"></div>
                    </div>

                    <button type="button" class="btn-login" onclick="submitRegister()">회원 가입</button>
                </div>

                <div class="login-links">
                    <a th:href="@{/login}">로그인으로 돌아가기</a>
                </div>

                <p class="login-footer">© 2026 HDCS Web Service. All rights reserved.</p>
            </div>
        </div>

    </div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    var ctx = /*[[${#request.contextPath}]]*/ '';

    var ID_RE    = /^(?=.*[a-zA-Z])[a-zA-Z0-9]+$/;
    var PW_RE    = /^(?=.*[a-zA-Z])(?=.*\d)(?=.*[!@#$%^&*()\-_=+\[\]{}|;:'",.<>?/\\`~]).{8,}$/;
    var NAME_RE  = /^[^\s!@#$%^&*()\-_=+\[\]{}|;:'",.<>?/\\`~]+$/;
    var EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    var idChecked   = false;
    var idAvailable = false;

    function setMsg(id, msg, isError) {
        var el = document.getElementById(id);
        el.textContent = msg;
        el.className = 'field-msg ' + (msg ? (isError ? 'field-error' : 'field-success') : '');
    }

    function setInputError(inputId, hasError) {
        var el = document.getElementById(inputId);
        if (hasError) { el.classList.add('input-error'); }
        else          { el.classList.remove('input-error'); }
    }

    /* ── 아이디 ── */
    function validateUserId() {
        var v = document.getElementById('userId').value.trim();
        if (!v) {
            setMsg('userIdMsg', '아이디를 입력해 주세요.', true);
            setInputError('userId', true);
            return false;
        }
        if (!ID_RE.test(v)) {
            setMsg('userIdMsg', '영문을 반드시 포함해야 하며, 영문과 숫자만 사용할 수 있습니다.', true);
            setInputError('userId', true);
            return false;
        }
        setMsg('userIdMsg', '', false);
        setInputError('userId', false);
        return true;
    }

    function onUserIdInput() {
        var valid = validateUserId();
        idChecked = false;
        idAvailable = false;
        document.getElementById('btnCheckDup').disabled = !valid;
        if (!idChecked) {
            var msgEl = document.getElementById('userIdMsg');
            if (!msgEl.textContent) {
                setMsg('userIdMsg', '', false);
            }
        }
    }

    function checkDuplicate() {
        var userId = document.getElementById('userId').value.trim();
        if (!validateUserId()) return;

        fetch(ctx + '/api/public/check-id?userId=' + encodeURIComponent(userId))
            .then(function(res) { return res.json(); })
            .then(function(data) {
                idChecked = true;
                idAvailable = data.available;
                setMsg('userIdMsg', data.message, !data.available);
                setInputError('userId', !data.available);
            })
            .catch(function() {
                setMsg('userIdMsg', '중복 확인 중 오류가 발생했습니다.', true);
            });
    }

    /* ── 이름 ── */
    function validateName() {
        var v = document.getElementById('name').value.trim();
        if (!v) {
            setMsg('nameMsg', '이름을 입력해 주세요.', true);
            setInputError('name', true);
            return false;
        }
        if (!NAME_RE.test(v)) {
            setMsg('nameMsg', '이름에 특수문자를 사용할 수 없습니다.', true);
            setInputError('name', true);
            return false;
        }
        setMsg('nameMsg', '', false);
        setInputError('name', false);
        return true;
    }

    /* ── 비밀번호 ── */
    function validatePassword() {
        var v = document.getElementById('password').value;
        if (!v) {
            setMsg('passwordMsg', '비밀번호를 입력해 주세요.', true);
            setInputError('password', true);
            return false;
        }
        if (v.length < 8) {
            setMsg('passwordMsg', '비밀번호는 8자 이상이어야 합니다.', true);
            setInputError('password', true);
            return false;
        }
        if (!PW_RE.test(v)) {
            setMsg('passwordMsg', '영문, 숫자, 특수문자를 모두 포함해야 합니다.', true);
            setInputError('password', true);
            return false;
        }
        setMsg('passwordMsg', '', false);
        setInputError('password', false);
        if (document.getElementById('passwordConfirm').value) {
            validatePasswordConfirm();
        }
        return true;
    }

    /* ── 비밀번호 확인 ── */
    function validatePasswordConfirm() {
        var pw  = document.getElementById('password').value;
        var pw2 = document.getElementById('passwordConfirm').value;
        if (!pw2) {
            setMsg('passwordConfirmMsg', '비밀번호 확인을 입력해 주세요.', true);
            setInputError('passwordConfirm', true);
            return false;
        }
        if (pw !== pw2) {
            setMsg('passwordConfirmMsg', '비밀번호가 일치하지 않습니다.', true);
            setInputError('passwordConfirm', true);
            return false;
        }
        setMsg('passwordConfirmMsg', '비밀번호가 일치합니다.', false);
        setInputError('passwordConfirm', false);
        return true;
    }

    /* ── 이메일 ── */
    function validateEmail() {
        var v = document.getElementById('email').value.trim();
        if (!v) {
            setMsg('emailMsg', '이메일을 입력해 주세요.', true);
            setInputError('email', true);
            return false;
        }
        if (!EMAIL_RE.test(v)) {
            setMsg('emailMsg', '올바른 이메일 형식이 아닙니다. (예: test@test.com)', true);
            setInputError('email', true);
            return false;
        }
        setMsg('emailMsg', '', false);
        setInputError('email', false);
        return true;
    }

    /* ── 제출 ── */
    function submitRegister() {
        var ok = true;
        ok = validateUserId()        && ok;
        ok = validateName()          && ok;
        ok = validatePassword()      && ok;
        ok = validatePasswordConfirm() && ok;
        ok = validateEmail()         && ok;

        if (!ok) return;

        if (!idChecked) {
            setMsg('userIdMsg', '아이디 중복확인을 해주세요.', true);
            setInputError('userId', true);
            document.getElementById('userId').focus();
            return;
        }
        if (!idAvailable) {
            setMsg('userIdMsg', '이미 사용 중인 아이디입니다.', true);
            setInputError('userId', true);
            return;
        }

        var payload = {
            userId:   document.getElementById('userId').value.trim(),
            name:     document.getElementById('name').value.trim(),
            password: document.getElementById('password').value,
            email:    document.getElementById('email').value.trim()
        };

        fetch(ctx + '/api/public/register', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify(payload)
        })
        .then(function(res) {
            return res.json().then(function(data) {
                return { ok: res.ok, data: data };
            });
        })
        .then(function(result) {
            if (result.ok) {
                document.getElementById('registerForm').style.display = 'none';
                var box = document.getElementById('successBox');
                box.innerHTML = '회원 가입이 완료되었습니다.<br>로그인 페이지로 이동합니다...';
                box.style.display = 'block';
                setTimeout(function() {
                    window.location.href = ctx + '/login';
                }, 2000);
            } else {
                setMsg('userIdMsg', result.data.message || '가입 중 오류가 발생했습니다.', true);
            }
        })
        .catch(function() {
            alert('가입 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.');
        });
    }
    /*]]>*/
</script>
</body>
</html>
