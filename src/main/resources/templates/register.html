<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원 가입 - HDCS Web Service</title>
    <link rel="stylesheet" th:href="@{/static/css/login.css}">
</head>
<body>
<div class="login-wrap">
    <div class="login-box" style="max-width: 1000px;">

        <!-- 왼쪽: 장식 패널 -->
        <div class="login-left">
            <div class="deco-ring deco-ring-1"></div>
            <div class="deco-ring deco-ring-2"></div>
            <div class="deco-ring deco-ring-3"></div>
            <div class="deco-dot deco-dot-1"></div>
            <div class="deco-dot deco-dot-2"></div>

            <div class="left-content">
                <img th:src="@{/static/images/logo.png}" alt="기후에너지환경부 한강홍수통제소" class="agency-logo">
                <div class="left-system-name">수자원통신위성<br>수문자료 수집 시스템</div>
                <p class="left-desc">기후에너지환경부 한강홍수통제소<br>HDCS Web Service 계정을 생성합니다</p>
            </div>

            <div class="left-badge">HDCS Web Service v1.0</div>
        </div>

        <!-- 오른쪽: 회원가입 폼 -->
        <div class="login-right">
            <div style="width: 100%; max-width: 440px;">

                <div class="right-title">회원 가입</div>
                <div class="right-subtitle">아래 정보를 입력하여 계정을 생성하세요</div>

                <div class="alert alert-error" th:if="${errorMsg}" th:text="${errorMsg}"></div>
                <div class="alert alert-info"  th:if="${infoMsg}"  th:text="${infoMsg}"></div>

                <form th:action="@{/register}" method="post" class="login-form">

                    <div class="">
                        <div class="form-group">
                            <label for="userId">아이디 *</label>
                            <input type="text" id="userId" name="userId"
                                   placeholder="영문+숫자 6~20자" required>
                        </div>
                    </div>

                    <div class="">
                        <div class="form-group">
                            <label for="name">이름 *</label>
                            <input type="text" id="name" name="name"
                                   placeholder="실명 입력" required>
                        </div>
                    </div>

                    <div class="">
                        <div class="form-group">
                            <label for="password">비밀번호 *</label>
                            <input type="password" id="password" name="password"
                                   placeholder="8자 이상" required>
                        </div>
                    </div>

                    <div class="">
                        <div class="form-group">
                            <label for="passwordConfirm">비밀번호 확인 *</label>
                            <input type="password" id="passwordConfirm" name="passwordConfirm"
                                   placeholder="비밀번호 재입력" required>
                        </div>
                    </div>

                    <div class="">
                        <div class="form-group">
                            <label for="email">이메일 *</label>
                            <input type="email" id="email" name="email"
                               placeholder="example@kwater.or.kr" required>
                        </div>
                    </div>

                    <!-- <div class="">
                        <div class="form-group">
                            <label for="phone">연락처</label>
                            <input type="text" id="phone" name="phone"
                                   placeholder="010-0000-0000">
                        </div>
                    </div> -->

                    <button type="submit" class="btn-login">회원 가입</button>
                </form>

                <div class="login-links">
                    <a th:href="@{/login}">로그인으로 돌아가기</a>
                </div>

                <p class="login-footer">© 2026 HDCS Web Service. All rights reserved.</p>
            </div>
        </div>

    </div>
</div>
</body>
</html>
