<div class="page-header">
    <div class="page-header-title">
        <span class="page-title-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
                <ellipse cx="12" cy="5" rx="9" ry="3"/>
                <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
                <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
            </svg>
        </span>
        <h2>저장장치 관리</h2>
    </div>
</div>

<div class="storage-wrap">

    <!-- ── 왼쪽: 저장장치별 저장공간 ── -->
    <div class="storage-left">
        <div class="storage-panel-title">저장장치별 저장공간</div>
        <div class="storage-device-area">
            <div class="no-data" style="padding: 40px 0;">사용된 저장장치가 없습니다.</div>
        </div>
    </div>

    <!-- ── 오른쪽: 폴더 파일 목록 ── -->
    <div class="storage-right">
        <div class="storage-panel-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
            폴더명:&nbsp;<span class="storage-folder-name">-</span>
        </div>

        <div class="storage-file-area">
            <table class="data-table">
                <thead>
                    <tr>
                        <th style="width:44px;">
                            <input type="checkbox" class="storage-chk">
                        </th>
                        <th>파일명</th>
                        <th style="width:90px;">파일종류</th>
                        <th style="width:80px;">용량</th>
                        <th style="width:150px;">저장경로</th>
                        <th style="width:110px;">생성일시</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="6" class="no-data">폴더가 없습니다.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="storage-right-footer">
            <button class="btn-storage-delete">삭제하기</button>
        </div>
    </div>

</div>
