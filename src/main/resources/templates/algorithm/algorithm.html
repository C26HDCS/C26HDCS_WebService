<div class="page-header">
    <h2>알고리즘 설정 관리</h2>
    <p>HDCS 알고리즘의 활성화 여부 및 설정을 관리합니다.</p>
</div>

<div class="card">
    <div class="card-title">알고리즘 목록</div>

    <table class="data-table">
        <thead>
            <tr>
                <th>No</th>
                <th>알고리즘명</th>
                <th>유형</th>
                <th>활성화</th>
                <th>관리</th>
            </tr>
        </thead>
        <tbody>
            <tr ng-if="algorithmList.length === 0">
                <td colspan="5" class="no-data">데이터가 없습니다.</td>
            </tr>
            <tr ng-repeat="item in algorithmList">
                <td>{{$index + 1}}</td>
                <td>{{item.name}}</td>
                <td>{{item.type}}</td>
                <td>
                    <span class="status-badge" ng-class="item.enabled ? 'status-done' : 'status-wait'">
                        {{item.enabled ? '활성' : '비활성'}}
                    </span>
                </td>
                <td>
                    <button class="btn btn-sm"
                            ng-class="item.enabled ? 'btn-secondary' : 'btn-primary'"
                            ng-click="toggleEnabled(item)">
                        {{item.enabled ? '비활성화' : '활성화'}}
                    </button>
                </td>
            </tr>
        </tbody>
    </table>
</div>
