<div class="page-header">
    <h2>FTP 설정 관리</h2>
    <p>자료 수집 및 배포에 사용되는 FTP 서버 설정을 관리합니다.</p>
</div>

<div class="card">
    <div class="card-title">FTP 서버 목록
        <button class="btn btn-primary btn-sm" style="float:right;" ng-click="showForm=true">+ 서버 추가</button>
    </div>
    <table class="data-table">
        <thead>
            <tr>
                <th>No</th>
                <th>서버명</th>
                <th>호스트</th>
                <th>포트</th>
                <th>사용자</th>
                <th>유형</th>
                <th>상태</th>
                <th>관리</th>
            </tr>
        </thead>
        <tbody>
            <tr ng-if="ftpList.length === 0">
                <td colspan="8" class="no-data">등록된 FTP 서버가 없습니다.</td>
            </tr>
            <tr ng-repeat="item in ftpList">
                <td>{{$index + 1}}</td>
                <td>{{item.name}}</td>
                <td>{{item.host}}</td>
                <td>{{item.port}}</td>
                <td>{{item.username}}</td>
                <td>{{item.type}}</td>
                <td>
                    <span class="status-badge" ng-class="item.active ? 'status-done' : 'status-wait'">
                        {{item.active ? '활성' : '비활성'}}
                    </span>
                </td>
                <td>
                    <button class="btn btn-primary btn-sm" ng-click="edit(item)">수정</button>
                    <button class="btn btn-secondary btn-sm" ng-click="testConnection(item)">연결 테스트</button>
                    <button class="btn btn-danger btn-sm" ng-click="remove(item)">삭제</button>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<div class="card" ng-show="showForm">
    <div class="card-title">{{editMode ? 'FTP 서버 수정' : 'FTP 서버 추가'}}</div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
        <div>
            <label style="display:block; font-size:13px; color:#888; margin-bottom:6px;">서버명 *</label>
            <input type="text" ng-model="form.name" placeholder="서버명 입력"
                   style="width:100%; padding:9px 12px; border:1px solid #dde0e7; border-radius:6px; font-size:13px;">
        </div>
        <div>
            <label style="display:block; font-size:13px; color:#888; margin-bottom:6px;">유형 *</label>
            <select ng-model="form.type"
                    style="width:100%; padding:9px 12px; border:1px solid #dde0e7; border-radius:6px; font-size:13px; font-family:inherit;">
                <option value="FTP">FTP</option>
                <option value="SFTP">SFTP</option>
                <option value="FTPS">FTPS</option>
            </select>
        </div>
        <div>
            <label style="display:block; font-size:13px; color:#888; margin-bottom:6px;">호스트 *</label>
            <input type="text" ng-model="form.host" placeholder="예: ftp.example.com"
                   style="width:100%; padding:9px 12px; border:1px solid #dde0e7; border-radius:6px; font-size:13px;">
        </div>
        <div>
            <label style="display:block; font-size:13px; color:#888; margin-bottom:6px;">포트 *</label>
            <input type="number" ng-model="form.port" placeholder="예: 21"
                   style="width:100%; padding:9px 12px; border:1px solid #dde0e7; border-radius:6px; font-size:13px;">
        </div>
        <div>
            <label style="display:block; font-size:13px; color:#888; margin-bottom:6px;">사용자명 *</label>
            <input type="text" ng-model="form.username" placeholder="FTP 사용자명"
                   style="width:100%; padding:9px 12px; border:1px solid #dde0e7; border-radius:6px; font-size:13px;">
        </div>
        <div>
            <label style="display:block; font-size:13px; color:#888; margin-bottom:6px;">비밀번호 *</label>
            <input type="password" ng-model="form.password" placeholder="FTP 비밀번호"
                   style="width:100%; padding:9px 12px; border:1px solid #dde0e7; border-radius:6px; font-size:13px;">
        </div>
    </div>
    <div style="margin-top:20px; text-align:right; display:flex; gap:8px; justify-content:flex-end;">
        <button class="btn btn-secondary" ng-click="cancelForm()">취소</button>
        <button class="btn btn-primary" ng-click="save()">저장</button>
    </div>
</div>
